<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WaCCA 予約フォーム</title>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: #FFF8F5;
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }
    .header h1 { font-size: 22px; color: #FF6B35; margin-bottom: 4px; }
    .header p { font-size: 13px; color: #888; }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 24px 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    .section-title {
      font-size: 15px;
      font-weight: bold;
      color: #FF6B35;
      margin-bottom: 20px;
      padding-bottom: 8px;
      border-bottom: 2px solid #FFE0D0;
    }

    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }
    label .required { color: #FF6B35; margin-left: 4px; }

    input, select {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #E0E0E0;
      border-radius: 10px;
      font-size: 16px;
      color: #333;
      background: #FAFAFA;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #FF6B35;
      background: #fff;
    }

    .consent-box {
      background: #FFF8F5;
      border: 1.5px solid #FFD0B8;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 20px;
    }
    .consent-box label {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 13px;
      font-weight: normal;
      color: #444;
      cursor: pointer;
    }
    .consent-box input[type="checkbox"] {
      width: 20px;
      min-width: 20px;
      height: 20px;
      margin-top: 1px;
      cursor: pointer;
      -webkit-appearance: checkbox;
      appearance: checkbox;
    }
    .consent-box a {
      color: #FF6B35;
      text-decoration: underline;
    }

    .btn {
      width: 100%;
      padding: 15px;
      background: #FF6B35;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.85; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }

    .message {
      margin-top: 20px;
      padding: 14px;
      border-radius: 10px;
      font-size: 14px;
      text-align: center;
      display: none;
    }
    .message.success { background: #E8F5E9; color: #2E7D32; display: block; }
    .message.error   { background: #FFEBEE; color: #C62828; display: block; }

    .loading {
      text-align: center;
      color: #888;
      font-size: 14px;
      padding: 40px 0;
    }

    .hidden { display: none; }
  </style>
</head>
<body>

<div class="header">
  <h1>🍚 WaCCA</h1>
  <p id="headerSub">読み込み中...</p>
</div>

<div class="card">
  <div id="loadingArea" class="loading">読み込み中...</div>

  <form id="registrationForm" class="hidden" onsubmit="submitRegistration(event)">
    <div class="section-title">📝 利用者登録</div>
    <div style="background:#FFF3E0; border-left:4px solid #FF6B35; padding:12px 14px; border-radius:6px; margin-bottom:20px; font-size:13px; color:#555; line-height:1.7;">
      こども食堂を安心安全にご利用いただくために、食中毒等の保険加入の対象とさせていただきます。そのために、以下の情報をご登録いただいております。登録は初回のみです。
    </div>

    <div class="form-group">
      <label>氏名 <span class="required">*</span></label>
      <input type="text" id="reg_name" placeholder="例：田中 花子" required maxlength="50">
    </div>
    <div class="form-group">
      <label>メールアドレス <span style="color:#888; font-size:11px; margin-left:4px;">任意（登録すると開催案内・リマインドが届きます）</span></label>
      <input type="email" id="reg_email" placeholder="例：example@email.com" maxlength="100">
    </div>
    <div class="form-group">
      <label>電話番号 <span class="required">*</span></label>
      <input type="tel" id="reg_phone" placeholder="例：090-0000-0000" required maxlength="20">
    </div>
    <div class="form-group">
      <label>生年月日 <span class="required">*</span></label>
      <input type="date" id="reg_birthdate" required>
    </div>
    <div class="form-group">
      <label>郵便番号 <span class="required">*</span></label>
      <input type="text" id="reg_zip" placeholder="例：123-4567" required maxlength="10">
    </div>
    <div class="form-group">
      <label>住所 <span class="required">*</span></label>
      <input type="text" id="reg_address" placeholder="例：東京都○○区○○町1-2-3" required maxlength="200">
    </div>

    <div class="consent-box">
      <label>
        <input type="checkbox" id="reg_consent" required>
        <span>
          <a href="https://toshitetote.github.io/wacca-liff/privacy.html" target="_blank">個人情報の取り扱い</a>について同意します
        </span>
      </label>
    </div>

    <button type="submit" class="btn" id="regBtn">登録する</button>
    <div id="regMessage" class="message"></div>
  </form>

  <form id="updateForm" class="hidden" onsubmit="submitUpdate(event)">
    <div class="section-title">✏️ 登録情報の変更</div>
    <div class="form-group">
      <label>氏名 <span class="required">*</span></label>
      <input type="text" id="upd_name" required maxlength="50">
    </div>
    <div class="form-group">
      <label>メールアドレス <span style="color:#888; font-size:11px; margin-left:4px;">任意（登録すると開催案内・リマインドが届きます）</span></label>
      <input type="email" id="upd_email" maxlength="100">
    </div>
    <div class="form-group">
      <label>電話番号 <span class="required">*</span></label>
      <input type="tel" id="upd_phone" required maxlength="20">
    </div>
    <div class="form-group">
      <label>生年月日 <span class="required">*</span></label>
      <input type="date" id="upd_birthdate" required>
    </div>
    <div class="form-group">
      <label>郵便番号 <span class="required">*</span></label>
      <input type="text" id="upd_zip" required maxlength="10">
    </div>
    <div class="form-group">
      <label>住所 <span class="required">*</span></label>
      <input type="text" id="upd_address" required maxlength="200">
    </div>
    <button type="submit" class="btn" id="updateBtn">更新する</button>
  </form>
  <div id="updateMessage" class="message"></div>

  <form id="reservationForm" class="hidden" onsubmit="submitReservation(event)">
    <div class="section-title">📅 来場予約</div>

    <div class="form-group">
      <label>開催日を選ぶ <span class="required">*</span></label>
      <select id="eventDate" required>
        <option value="">選択してください</option>
      </select>
    </div>
    <div class="form-group">
      <label>大人の人数 <span class="required">*</span></label>
      <select id="adultCount" required onchange="updateFee()">
        <option value="">選択してください</option>
        <option value="0">0名</option>
        <option value="1">1名</option>
        <option value="2">2名</option>
        <option value="3">3名</option>
        <option value="4">4名</option>
        <option value="5">5名</option>
      </select>
    </div>
    <div class="form-group">
      <label>こどもの人数 <span class="required">*</span></label>
      <select id="childCount" required onchange="updateFee()">
        <option value="">選択してください</option>
        <option value="0">0名</option>
        <option value="1">1名</option>
        <option value="2">2名</option>
        <option value="3">3名</option>
        <option value="4">4名</option>
        <option value="5">5名</option>
      </select>
    </div>

    <div id="feeDisplay" style="display:none; background:#FFF3E0; border-left:4px solid #FF6B35; padding:14px 16px; border-radius:8px; margin-bottom:18px; font-size:15px; color:#333; line-height:1.9;"></div>

    <div class="consent-box">
      <label>
        <input type="checkbox" id="allergy_consent" required>
        <span>
          <a href="https://toshitetote.github.io/wacca-liff/allergy.html" target="_blank">アレルギーポリシー</a>に同意の上、提供される食事にアレルギー物質が含まれる可能性があることを理解し、自己の責任において参加します
        </span>
      </label>
    </div>

    <button type="submit" class="btn" id="submitBtn">予約を確定する</button>
  </form>

  <div id="resultMessage" class="message"></div>
</div>

<script>
  let lineUserId = null;
  let adultPrice = 0;
  let childPrice = 0;

  const GAS_URL = 'https://script.google.com/macros/s/AKfycbym2Gzed66_kHtluEeWp0IQtoB0WnjBKVz1wMEIVB88BBp09iji91KHft8sCUVbQU-IKw/exec';
  const shopId = new URLSearchParams(window.location.search).get('shopId') || '';

  async function init() {
    try {
      await liff.init({ liffId: '2010340510-QLo64pFE' });

      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      const profile = await liff.getProfile();
      lineUserId = profile.userId;

      const res = await fetch(`${GAS_URL}?action=checkRegistered&shopId=${shopId}&userId=${lineUserId}`);
      const data = await res.json();

      document.getElementById('loadingArea').style.display = 'none';

      if (data.registered) {
        // 情報変更モードかどうか確認
        const mode = new URLSearchParams(window.location.search).get('mode');
        if (mode === 'update') {
          document.getElementById('headerSub').textContent = '登録情報の変更';
          await loadUserInfo();
          document.getElementById('updateForm').classList.remove('hidden');
        } else {
          document.getElementById('headerSub').textContent = '来場予約フォーム';
          await Promise.all([loadEvents(), loadPrices()]);
          document.getElementById('reservationForm').classList.remove('hidden');
        }
      } else {
        document.getElementById('headerSub').textContent = '初回登録フォーム';
        document.getElementById('registrationForm').classList.remove('hidden');
      }

    } catch (e) {
      document.getElementById('loadingArea').textContent = 'エラーが発生しました。LINEアプリから開いてください。';
    }
  }

  async function loadUserInfo() {
    const res  = await fetch(`${GAS_URL}?action=getUserInfo&shopId=${shopId}&userId=${lineUserId}`);
    const data = await res.json();
    if (data.success) {
      document.getElementById('upd_name').value      = data.name      || '';
      document.getElementById('upd_email').value     = data.email     || '';
      document.getElementById('upd_phone').value     = data.phone     || '';
      document.getElementById('upd_birthdate').value = data.birthdate || '';
      document.getElementById('upd_zip').value       = data.zip       || '';
      document.getElementById('upd_address').value   = data.address   || '';
    }
  }

  async function submitUpdate(e) {
    e.preventDefault();
    const btn = document.getElementById('updateBtn');
    btn.disabled = true;
    btn.textContent = '送信中...';

    const params = new URLSearchParams({
      action:    'updateUserInfo',
      shopId:    shopId,
      userId:    lineUserId,
      name:      document.getElementById('upd_name').value.trim(),
      email:     document.getElementById('upd_email').value.trim(),
      phone:     document.getElementById('upd_phone').value.trim(),
      birthdate: document.getElementById('upd_birthdate').value,
      zip:       document.getElementById('upd_zip').value.trim(),
      address:   document.getElementById('upd_address').value.trim()
    });

    try {
      const res    = await fetch(`${GAS_URL}?${params}`);
      const result = await res.json();
      const msg    = document.getElementById('updateMessage');
      if (result.success) {
        document.getElementById('updateForm').classList.add('hidden');
        msg.className = 'message success';
        msg.innerHTML = '<strong>✅ 登録情報を更新しました。</strong><br><span style="font-size:13px;">内容が正常に保存されました。このページを閉じてください。</span>';
        msg.style.display = 'block';
        window.scrollTo(0, 0);
      } else {
        msg.className = 'message error';
        msg.textContent = '⚠️ ' + result.message;
        msg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '更新する';
      }
    } catch (err) {
      const msg = document.getElementById('updateMessage');
      msg.className = 'message error';
      msg.textContent = '⚠️ ' + err.toString();
      msg.style.display = 'block';
      btn.disabled = false;
      btn.textContent = '更新する';
    }
  }

  async function loadPrices() {
    const res = await fetch(`${GAS_URL}?action=getPrices&shopId=${shopId}`);
    const data = await res.json();
    adultPrice = data.adultPrice || 0;
    childPrice = data.childPrice || 0;
  }

  function updateFee() {
    const ac = parseInt(document.getElementById('adultCount').value) || 0;
    const cc = parseInt(document.getElementById('childCount').value) || 0;
    const feeDiv = document.getElementById('feeDisplay');

    if (document.getElementById('adultCount').value === '' || document.getElementById('childCount').value === '') {
      feeDiv.style.display = 'none';
      return;
    }

    const total = ac * adultPrice + cc * childPrice;
    let html = '';
    if (adultPrice > 0) html += `大人 ${ac}名 × ${adultPrice.toLocaleString()}円<br>`;
    if (childPrice > 0) html += `こども ${cc}名 × ${childPrice.toLocaleString()}円<br>`;
    if (adultPrice === 0 && childPrice === 0) {
      html = '利用料は無料です';
    } else {
      html += `<strong>利用料：${total.toLocaleString()}円</strong>`;
    }
    feeDiv.innerHTML = html;
    feeDiv.style.display = 'block';
  }

  async function loadEvents() {
    const res = await fetch(`${GAS_URL}?action=getEvents&shopId=${shopId}`);
    const events = await res.json();
    const select = document.getElementById('eventDate');

    if (events.length === 0) {
      const opt = document.createElement('option');
      opt.textContent = '現在予約できる開催日がありません';
      opt.disabled = true;
      select.appendChild(opt);
      return;
    }

    events.forEach(ev => {
      const opt = document.createElement('option');
      opt.value = ev.date;
      opt.textContent = `${ev.dateLabel}　${ev.time}　${ev.location}`;
      select.appendChild(opt);
    });
  }

  async function submitRegistration(e) {
    e.preventDefault();
    const btn = document.getElementById('regBtn');
    btn.disabled = true;
    btn.textContent = '送信中...';

    const params = new URLSearchParams({
      action: 'registerUser',
      shopId: shopId,
      userId: lineUserId,
      name:      document.getElementById('reg_name').value.trim(),
      email:     document.getElementById('reg_email').value.trim(),
      phone:     document.getElementById('reg_phone').value.trim(),
      birthdate: document.getElementById('reg_birthdate').value,
      zip:       document.getElementById('reg_zip').value.trim(),
      address:   document.getElementById('reg_address').value.trim()
    });

    try {
      const res = await fetch(`${GAS_URL}?${params}`);
      const result = await res.json();

      const msg = document.getElementById('regMessage');
      if (result.success) {
        document.getElementById('registrationForm').classList.add('hidden');
        document.getElementById('headerSub').textContent = '来場予約フォーム';
        await Promise.all([loadEvents(), loadPrices()]);
        document.getElementById('reservationForm').classList.remove('hidden');
      } else {
        msg.className = 'message error';
        msg.textContent = '⚠️ ' + result.message;
        btn.disabled = false;
        btn.textContent = '登録する';
      }
    } catch (err) {
      const msg = document.getElementById('regMessage');
      msg.className = 'message error';
      msg.textContent = '⚠️ ' + err.toString();
      btn.disabled = false;
      btn.textContent = '登録する';
    }
  }

  async function submitReservation(e) {
    e.preventDefault();
    const adultCount = parseInt(document.getElementById('adultCount').value) || 0;
    const childCount = parseInt(document.getElementById('childCount').value) || 0;
    if (adultCount + childCount === 0) {
      alert('大人またはこどもの人数を1名以上選択してください。');
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '送信中...';

    const params = new URLSearchParams({
      action: 'submitReservation',
      shopId: shopId,
      userId: lineUserId,
      eventDate:  document.getElementById('eventDate').value,
      adultCount: adultCount,
      childCount: childCount
    });

    try {
      const res = await fetch(`${GAS_URL}?${params}`);
      const result = await res.json();

      const msg = document.getElementById('resultMessage');
      if (result.success) {
        document.getElementById('reservationForm').classList.add('hidden');
        msg.className = 'message success';
        msg.textContent = '✅ 予約が完了しました！当日のご来場をお待ちしております🍚';
        msg.style.display = 'block';
      } else {
        msg.className = 'message error';
        msg.textContent = '⚠️ ' + result.message;
        msg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '予約を確定する';
      }
    } catch (err) {
      const msg = document.getElementById('resultMessage');
      msg.className = 'message error';
      msg.textContent = '⚠️ ' + err.toString();
      msg.style.display = 'block';
      btn.disabled = false;
      btn.textContent = '予約を確定する';
    }
  }

  init();
</script>
</body>
</html>
